name: Feature request
description: Suggest a new feature, integration, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. A few notes before filing:

        - War Room is intentionally focused on the "one screen for AI agent ops" thesis. Features outside that scope (cloud sync, multi-user backend, replacing core tech) are unlikely to be accepted.
        - Smaller scoped requests with concrete use cases get reviewed faster than big visions.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the friction you're hitting. The "why" matters more than the "what."
      placeholder: |
        When I'm running multiple agents, I can't easily...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen? Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other ways the problem could be solved.
  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - "Nice to have — would use it occasionally"
        - "Useful — would noticeably improve my flow"
        - "Critical — I can't really use War Room without this"
    validations:
      required: true
