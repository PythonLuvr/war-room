name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Temporarily non-blocking. Existing lint errors are tracked
        # separately; restore strict mode once they're cleared.
        continue-on-error: true
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build with no external services configured so we exercise the
          # zero-config path that fresh forkers will hit.
          NODE_ENV: production
