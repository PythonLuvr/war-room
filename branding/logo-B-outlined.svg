<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Variant B: Outlined / minimal. Stroke shield, stroke swords. -->
  <!-- Cleanest at small sizes, modern app-icon vibe. -->

  <path d="M128 28 L212 56 L212 130 C212 180 176 214 128 226 C80 214 44 180 44 130 L44 56 Z"
        stroke="#f5f5f5" stroke-width="9" stroke-linejoin="round"/>

  <!-- Sword 1 (back): top-left to bottom-right -->
  <g transform="translate(128 128) rotate(45)" stroke="#f5f5f5" stroke-width="7" stroke-linecap="round">
    <line x1="0" y1="-92" x2="0" y2="48"/>
    <line x1="-24" y1="48" x2="24" y2="48"/>
    <line x1="0" y1="54" x2="0" y2="78"/>
  </g>
  <circle cx="128" cy="128" r="0"/>

  <!-- Sword 2 (front): top-right to bottom-left -->
  <g transform="translate(128 128) rotate(-45)" stroke="#f5f5f5" stroke-width="7" stroke-linecap="round">
    <line x1="0" y1="-92" x2="0" y2="48"/>
    <line x1="-24" y1="48" x2="24" y2="48"/>
    <line x1="0" y1="54" x2="0" y2="78"/>
  </g>
</svg>
